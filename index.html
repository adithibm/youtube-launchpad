<!DOCTYPE html>
<html>
<head>
  <title>My Learning YouTube</title>

  <!-- This whole block just makes it look like a grid. Ignore it for now. -->
  <style>
    body {
      font-family: sans-serif;
      background: #f0f0f0;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      max-width: 700px;
      margin: 0 auto;
    }
    .card {
      background: white;
      padding: 30px 15px;
      text-align: center;
      text-decoration: none;
      color: black;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>My Learning YouTube</h1>

  <!-- Each line below is one channel card. This is the part you'll edit next. -->
  <div class="grid">
    <a class="card" href="https://www.youtube.com/@khanacademy" target="_blank">Khan Academy</a>
    <a class="card" href="https://www.youtube.com/@3blue1brown" target="_blank">3Blue1Brown</a>
    <a class="card" href="https://www.youtube.com/@veritasium" target="_blank">Veritasium</a>
    <a class="card" href="https://www.youtube.com/@CleoAbram" target="_blank">Cleo Abram</a>
    <a class="card" href="https://www.youtube.com/@freecodecamp" target="_blank">freeCodeCamp.org</a>
    <a class="card" href="https://www.youtube.com/@theMITmonk" target="_blank">theMITmonk</a>
    <a class="card" href="https://www.youtube.com/@AlexHormozi" target="_blank">Alex Hormozi</a>
    <a class="card" href="https://www.youtube.com/@PhysicsWallah" target="_blank">Physics Wallah</a>
    <a class="card" href="https://www.youtube.com/@mitocw" target="_blank">MIT OpenCourseWare</a>
    <a class="card" href="https://www.youtube.com/@crashcourse" target="_blank">CrashCourse</a>

  </div>
</body>
</html>
